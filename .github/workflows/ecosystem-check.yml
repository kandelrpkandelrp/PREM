name: PREM Ecosystem CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-ecosystem:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Validate Documentation Structure
      run: |
        echo "Validating PREM Ecosystem Documentation and Architecture..."
        if [ -f "docs/01-foundation.md" ] && [ -f "docs/02-philosophy.md" ]; then
          echo "SUCCESS: Core foundational documents verified."
        else
          echo "ERROR: Missing essential foundational documents!"
          exit 1
        fi
        echo "Ecosystem structural check completed successfully."
